<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>《草芥》— 游戏策划案</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=ZCOOL+KuaiLe&family=Quicksand:wght@400;600;700&display=swap">
  <style>
    :root {
      --sidebar-width: 260px;
      --theme-color: #4a7c3f;
      --theme-color-dark: #2d5016;
      --pixel-shadow: #2a2018;
      --pixel-size: 2px;
      --font-cute: "ZCOOL KuaiLe", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-pixel: "Press Start 2P", monospace;
    }

    /* === 全局背景与字体 === */
    body {
      background-color: #f5f0e8;
      color: #3a2f28;
      font-family: var(--font-cute);
      font-size: 16px;
    }

    /* 像素字体：仅用于装饰性元素 */
    .pixel-font {
      font-family: var(--font-pixel);
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: unset;
      font-smooth: never;
      text-rendering: optimizeSpeed;
    }

    /* === 扫描线纹理覆盖 === */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.015) 2px,
        rgba(0, 0, 0, 0.015) 4px
      );
    }

    /* === 侧边栏 === */
    .sidebar {
      background-color: #ebe4d8;
      border-right: var(--pixel-size) solid #c8a96e;
      box-shadow: var(--pixel-size) 0 0 0 #b89a5e;
    }
    .sidebar .sidebar-nav {
      padding-top: 12px;
    }
    .sidebar .app-name {
      font-family: var(--font-pixel);
      -webkit-font-smoothing: none;
      color: var(--theme-color-dark);
      font-size: 0.7em;
      padding: 20px 16px 10px;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }
    /* 侧边栏：小字号，紧凑 */
    .sidebar ul li a {
      color: #5c4a3a;
      font-size: 0.85em;
      padding: 5px 20px;
      transition: color 0.15s, background-color 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar ul li a:hover {
      color: var(--theme-color-dark);
      background-color: #ddd5c5;
      border-left-color: #c8a96e;
    }
    .sidebar ul li.active > a {
      color: var(--theme-color-dark);
      font-weight: 600;
      border-left: 3px solid var(--theme-color);
      background-color: #e0d8c8;
    }
    .sidebar ul li ul li a {
      font-size: 0.78em;
      padding-left: 32px;
    }

    /* === 主内容区：大字号，拉开与侧边栏差距 === */
    .markdown-section {
      max-width: 800px;
      color: #3a2f28;
      font-size: 1.15em;
      line-height: 1.9;
    }

    /* 标题：圆润可爱字体 + 像素装饰 */
    .markdown-section h1 {
      font-family: var(--font-cute);
      font-size: 1.8em;
      color: var(--theme-color-dark);
      letter-spacing: 0.06em;
      line-height: 1.5;
      border-bottom: none;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    /* h1 像素装饰下划线 */
    .markdown-section h1::after {
      content: '';
      display: block;
      margin-top: 12px;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #c8a96e 0px, #c8a96e 8px,
        transparent 8px, transparent 12px,
        #4a7c3f 12px, #4a7c3f 20px,
        transparent 20px, transparent 24px
      );
    }

    .markdown-section h2 {
      font-family: var(--font-cute);
      font-size: 1.3em;
      color: #4a6741;
      letter-spacing: 0.04em;
      line-height: 1.6;
      border-bottom: none;
      padding-bottom: 8px;
      margin-top: 32px;
    }
    /* h2 像素装饰下划线 */
    .markdown-section h2::after {
      content: '';
      display: block;
      margin-top: 8px;
      height: 2px;
      background: repeating-linear-gradient(
        90deg,
        #4a6741 0px, #4a6741 4px,
        transparent 4px, transparent 8px
      );
    }

    .markdown-section h3 {
      font-family: var(--font-cute);
      font-size: 1.15em;
      color: #5c4a3a;
      border-left: 4px solid #c8a96e;
      padding-left: 12px;
    }

    /* 链接 */
    .markdown-section a {
      color: var(--theme-color);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .markdown-section a:hover {
      color: var(--theme-color-dark);
      border-bottom-color: var(--theme-color);
    }

    /* 引用块：像素边框 */
    .markdown-section blockquote {
      border-left: none;
      background-color: #efe9db;
      color: #5c4a3a;
      padding: 14px 18px;
      margin: 16px 0;
      box-shadow:
        4px 0 0 0 #c8a96e,
        2px 2px 0 0 #c8a96e,
        -2px 0 0 0 #d4cbb8,
        0 -2px 0 0 #d4cbb8,
        0 4px 0 0 #d4cbb8;
    }

    /* 行内代码 */
    .markdown-section code {
      background-color: #e8e0d0;
      color: #6b4c3b;
      border-radius: 0;
      padding: 2px 6px;
      box-shadow: 2px 2px 0 0 rgba(42, 32, 24, 0.15);
    }

    /* 代码块 */
    .markdown-section pre {
      background-color: #3a2f28;
      border-radius: 0;
      box-shadow:
        4px 4px 0 0 rgba(42, 32, 24, 0.4);
      border: 2px solid #5c4a3a;
    }
    .markdown-section pre code {
      background-color: transparent;
      color: #e8dcc8;
      box-shadow: none;
    }

    /* 表格：像素边框 */
    .markdown-section table {
      border: 2px solid #c8a96e;
      border-radius: 0;
      box-shadow: 3px 3px 0 0 rgba(42, 32, 24, 0.2);
      border-collapse: separate;
      border-spacing: 0;
    }
    .markdown-section table th {
      background-color: #e8e0d0;
      color: var(--theme-color-dark);
      border-bottom: 2px solid #c8a96e;
      font-weight: 700;
    }
    .markdown-section table td {
      border-color: #d4cbb8;
    }
    .markdown-section table tr:hover td {
      background-color: #f0eade;
    }

    /* 水平线：像素点阵 */
    .markdown-section hr {
      border: none;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #c8a96e 0px, #c8a96e 4px,
        transparent 4px, transparent 8px,
        #d4cbb8 8px, #d4cbb8 12px,
        transparent 12px, transparent 16px
      );
      margin: 24px 0;
    }

    /* 列表项标记 */
    .markdown-section ul li::marker {
      color: var(--theme-color);
    }
    .markdown-section ol li::marker {
      color: var(--theme-color-dark);
      font-weight: 700;
    }

    /* === 搜索框 === */
    .search input {
      font-family: var(--font-cute);
      background-color: #ebe4d8 !important;
      border: 2px solid #c8a96e !important;
      border-radius: 0 !important;
      color: #3a2f28 !important;
      box-shadow: 2px 2px 0 0 rgba(42, 32, 24, 0.15);
    }
    .search input:focus {
      border-color: var(--theme-color) !important;
      box-shadow: 2px 2px 0 0 rgba(74, 124, 63, 0.3);
    }

    /* === 封面页 === */
    .cover-main {
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        ),
        linear-gradient(160deg, #2a2018 0%, #3a2f28 30%, #3d4a2e 70%, #2d3a25 100%) !important;
    }
    .cover-main .cover-main__title {
      font-family: var(--font-pixel);
      -webkit-font-smoothing: none;
      color: #f0e6d0;
      font-size: 3.6em;
      letter-spacing: 0.25em;
      text-shadow:
        0 0 40px rgba(200, 169, 110, 0.4),
        0 0 80px rgba(200, 169, 110, 0.15),
        4px 4px 0 #1a140e,
        8px 8px 0 rgba(26, 20, 14, 0.5);
      margin-bottom: 20px;
    }
    .cover-main .cover-main__description {
      font-family: var(--font-cute);
      color: #d4c0a0;
      font-size: 1.15em;
      max-width: 500px;
      line-height: 2.2;
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.4);
    }
    .cover-main a.start {
      font-family: var(--font-pixel);
      -webkit-font-smoothing: none;
      border: 2px solid #c8a96e !important;
      color: #c8a96e !important;
      border-radius: 0;
      padding: 14px 36px;
      font-size: 0.7em;
      letter-spacing: 0.15em;
      box-shadow: 4px 4px 0 0 rgba(200, 169, 110, 0.4);
      transition: all 0.15s;
    }
    .cover-main a.start:hover {
      background-color: #c8a96e;
      color: #2a2018 !important;
      box-shadow: 2px 2px 0 0 rgba(200, 169, 110, 0.6);
      transform: translate(2px, 2px);
    }
    .cover-main a.start:active {
      box-shadow: 1px 1px 0 0 rgba(200, 169, 110, 0.6);
      transform: translate(3px, 3px);
    }

    /* 封面页装饰像素块 */
    .cover-main::before {
      content: '';
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #c8a96e 0px, #c8a96e 8px,
        transparent 8px, transparent 16px,
        #4a7c3f 16px, #4a7c3f 24px,
        transparent 24px, transparent 32px
      );
      opacity: 0.6;
    }

    /* === 响应式 === */
    @media screen and (max-width: 768px) {
      .markdown-section {
        max-width: 100%;
        font-size: 1.05em;
      }
      .cover-main .cover-main__title {
        font-size: 2.2em;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '《草芥》策划案',
      repo: '',
      loadSidebar: true,
      coverpage: true,
      subMaxLevel: 3,
      search: {
        placeholder: '搜索策划案...',
        noData: '没有结果',
        paths: 'auto'
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
